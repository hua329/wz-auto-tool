adb_path: ""
device: ""
display: "2"
interval: 1.2

# These coordinates are normalized to the 1280x720 ADB game display.
# The desktop app clicks by default. CLI dry-run remains available unless --enable-clicks is used.
bootstrap_steps:
  - name: 01_home_click_battle
    x: 0.406
    y: 0.750
    delay_after: 1.8
  - name: 02_battle_click_5v5_arena
    x: 0.313
    y: 0.563
    delay_after: 1.6
  - name: 03_arena_click_ai_mode
    x: 0.617
    y: 0.838
    delay_after: 1.4
  - name: 04_ai_click_start_practice
    x: 0.828
    y: 0.792
    delay_after: 2.0

states:
  # Templates are loaded from templates.dat in the desktop release.
  - name: 00_in_game_minimap_guard
    enabled: true
    mode: reference
    template: templates/09_in_game.png
    current_crop: [0, 0, 0.23, 0.34]
    reference_crop: [0, 0.086, 0.23, 0.40]
    threshold: 0.82
    action:
      type: none
    delay_after: 8.0

  - name: 01_home
    enabled: true
    mode: reference
    template: templates/01_home.png
    threshold: 0.82
    action:
      type: tap
      x: 0.406
      y: 0.750
      coord: norm
    delay_after: 1.8

  - name: 02_battle_5v5
    enabled: true
    mode: reference
    template: templates/02_battle_5v5.png
    threshold: 0.82
    action:
      type: tap
      x: 0.313
      y: 0.563
      coord: norm
    delay_after: 1.6

  - name: 03_arena_ai
    enabled: true
    mode: reference
    template: templates/03_arena_ai.png
    threshold: 0.82
    action:
      type: tap
      x: 0.617
      y: 0.838
      coord: norm
    delay_after: 1.4

  - name: 04_ai_start_practice
    enabled: true
    mode: reference
    template: templates/04_ai_start_practice.png
    threshold: 0.82
    action:
      type: tap
      x: 0.828
      y: 0.792
      coord: norm
    delay_after: 2.0

  - name: 05_room_start_match
    enabled: true
    mode: reference
    template: templates/05_room.png
    threshold: 0.82
    action:
      type: tap
      x: 0.605
      y: 0.921
      coord: norm
    delay_after: 3.0

  - name: 06_match_success_confirm
    enabled: true
    mode: heuristic
    heuristic: gold_button
    region: [0.36, 0.72, 0.64, 0.89]
    template: templates/06_match_success.png
    threshold: 0.62
    action:
      type: tap
      x: 0.50
      y: 0.815
      coord: norm
    delay_after: 2.0

  - name: 07_hero_select_open_list
    enabled: true
    mode: reference
    template: templates/07_hero_select_unpicked.png
    current_crop: [0.00, 0.00, 0.22, 0.72]
    reference_crop: [0.00, 0.086, 0.22, 0.744]
    threshold: 0.90
    action:
      type: tap
      x: 0.207
      y: 0.460
      coord: norm
      followup_taps:
        - x: 0.431
          y: 0.041
          coord: norm
          delay: 0.8
    delay_after: 1.0

  - name: 07_hero_list_choose_mid_tab
    enabled: true
    mode: reference
    template: templates/07_hero_list_all.png
    current_crop: [0, 0.10, 0.86, 0.50]
    reference_crop: [0, 0.18, 0.86, 0.56]
    threshold: 0.86
    action:
      type: tap
      x: 0.431
      y: 0.041
      coord: norm
    delay_after: 1.0

  - name: 07_hero_mid_pick_milaidi
    enabled: true
    mode: reference
    template: templates/07_hero_list_mid.png
    current_crop: [0.26, 0.02, 0.68, 0.18]
    reference_crop: [0.26, 0.08, 0.68, 0.24]
    threshold: 0.78
    action:
      type: tap_template
      template: templates/milaidi_avatar.png
      search_region: [0.00, 0.10, 0.70, 0.72]
      threshold: 0.66
      followup_taps:
        - x: 0.922
          y: 0.924
          coord: norm
          delay: 0.8
    delay_after: 1.0

  - name: 07_hero_select_confirm_gold
    enabled: true
    mode: heuristic
    heuristic: gold_button
    region: [0.83, 0.86, 0.99, 0.99]
    threshold: 0.50
    action:
      type: tap
      x: 0.922
      y: 0.924
      coord: norm
    delay_after: 4.0

  - name: 07_hero_select_confirm
